<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Zyada</title>
<style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;text-align:center;padding:48px 20px;color:#1C1430}a{display:inline-block;margin-top:18px;padding:12px 20px;background:#5B2186;color:#fff;border-radius:24px;text-decoration:none;font-weight:600}</style>
</head>
<body>
<h2>Opening Zyada…</h2>
<p>If the app does not open automatically, tap below.</p>
<a id="store" href="https://play.google.com/store/apps/details?id=com.zyada.reviews">Open Zyada</a>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var screen=(p.get('s')||'home').replace(/[^a-z0-9_-]/gi,'');
  var deep='zyada://'+screen;
  var store='https://play.google.com/store/apps/details?id=com.zyada.reviews';
  document.getElementById('store').href=store;
  // try the app first, fall back to the Play Store
  var t=setTimeout(function(){location.href=store;},1500);
  window.addEventListener('pagehide',function(){clearTimeout(t);});
  location.href=deep;
})();
</script>
</body>
</html>
